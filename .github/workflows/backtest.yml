name: Screener Backtest (manual)

# 수동 실행 전용 — 1회성 필터 유효성 측정.
# GitHub Actions 에서 "Run workflow" 누르고 결과 CSV 를 Artifacts 에서 다운로드.

on:
  workflow_dispatch:
    inputs:
      start:
        description: "시작일 (YYYY-MM-DD)"
        required: true
        default: "2024-10-01"
      end:
        description: "종료일 (YYYY-MM-DD)"
        required: true
        default: "2025-03-31"
      hold_days:
        description: "보유 영업일 (예: 21 = 약 4주)"
        required: false
        default: "21"
      top_kospi:
        description: "KOSPI 상위 N"
        required: false
        default: "200"
      top_kosdaq:
        description: "KOSDAQ 상위 N"
        required: false
        default: "100"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/python/requirements-screener.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements-screener.txt

      - name: Run backtest
        run: |
          python scripts/python/backtest.py \
            --start "${{ inputs.start }}" \
            --end "${{ inputs.end }}" \
            --hold-days "${{ inputs.hold_days }}" \
            --top-kospi "${{ inputs.top_kospi }}" \
            --top-kosdaq "${{ inputs.top_kosdaq }}" \
            --output backtest_results.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-${{ inputs.start }}-to-${{ inputs.end }}
          path: backtest_results.csv
          retention-days: 30
